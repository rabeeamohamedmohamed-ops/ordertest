<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Buffalo Bono | نظام طلبات محلي</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #0A0A0A;
      color: #F5F0E8;
      transition: all 0.2s ease;
    }

    body.rtl {
      direction: rtl;
      text-align: right;
    }

    body.ltr {
      direction: ltr;
      text-align: left;
    }

    .app-container {
      max-width: 550px;
      margin: 0 auto;
      background: #0F0F0F;
      min-height: 100vh;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      position: relative;
    }

    .app-header {
      position: sticky;
      top: 0;
      background: rgba(15, 15, 15, 0.94);
      backdrop-filter: blur(14px);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 200, 100, 0.2);
      z-index: 110;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #F9B23F, #FFD966);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .header-actions {
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }

    .icon-btn {
      background: #1E1E1E;
      border: none;
      padding: 0.45rem 1rem;
      border-radius: 40px;
      color: #FFD966;
      font-weight: 600;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    .icon-btn:active {
      transform: scale(0.96);
    }

    .hero-modern {
      background: linear-gradient(145deg, #1E1A10, #0F0B05);
      padding: 2rem 1.5rem;
      text-align: center;
      border-bottom-left-radius: 32px;
      border-bottom-right-radius: 32px;
      margin-bottom: 0.5rem;
    }

    .hero-modern h2 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(115deg, #FFE6B0, #FFA559);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-modern p {
      margin-top: 0.6rem;
      font-size: 0.9rem;
      color: #C0B7A8;
    }

    .btn-primary {
      background: #F9B23F;
      border: none;
      margin-top: 1.2rem;
      padding: 0.8rem 1.8rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.95rem;
      color: #0F0F0F;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(249, 178, 63, 0.25);
      transition: 0.2s;
    }

    .category-tabs {
      display: flex;
      overflow-x: auto;
      gap: 0.8rem;
      padding: 1rem 1rem 0.5rem;
      scrollbar-width: thin;
      white-space: nowrap;
    }

    .category-tab {
      background: #1C1C1C;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #E2D8C8;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .category-tab.active {
      background: #F9B23F;
      color: #0A0A0A;
      box-shadow: 0 4px 12px rgba(249, 178, 63, 0.4);
    }

    .menu-items-container {
      padding: 1rem;
      display: none;
      animation: fade 0.25s ease;
    }

    .menu-items-container.active-category {
      display: block;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(8px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .menu-card {
      background: #191919;
      border-radius: 28px;
      padding: 1rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #2C2C2C;
      transition: 0.1s;
    }

    .item-info {
      flex: 3;
    }

    .item-name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .item-desc {
      font-size: 0.7rem;
      color: #AEA18D;
      margin-top: 4px;
    }

    .item-price {
      font-weight: 800;
      color: #FFC857;
      font-size: 1rem;
      margin-top: 6px;
    }

    .add-to-cart-btn {
      background: #F9B23F;
      border: none;
      border-radius: 60px;
      padding: 0.55rem 1rem;
      font-weight: bold;
      color: #0A0A0A;
      cursor: pointer;
      font-size: 0.75rem;
      min-width: 85px;
    }

    .checkout-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }

    .checkout-overlay.open {
      visibility: visible;
      opacity: 1;
    }

    .checkout-drawer {
      background: #111111;
      max-width: 550px;
      width: 100%;
      margin: 0 auto;
      border-radius: 32px 32px 0 0;
      padding: 1.5rem;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .checkout-overlay.open .checkout-drawer {
      transform: translateY(0);
    }

    .receipt-card {
      background: #1C1C1C;
      border-radius: 24px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .cart-item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 0;
      border-bottom: 1px dashed #333;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .qty-input {
      width: 65px;
      background: #2A2A2A;
      border: 1px solid #F9B23F;
      border-radius: 40px;
      text-align: center;
      color: white;
      padding: 6px;
    }

    .del-item-btn {
      background: #3A1E1E;
      border: none;
      border-radius: 30px;
      padding: 5px 12px;
      color: #FFA559;
      font-weight: bold;
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    input, select, textarea {
      background: #242424;
      border: 1px solid #3D3D3D;
      border-radius: 28px;
      padding: 12px 16px;
      color: white;
      font-family: inherit;
    }

    .place-order-btn {
      background: #F9B23F;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 50px;
      font-weight: 800;
      margin-top: 10px;
      cursor: pointer;
    }

    .toast-msg {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #F9B23F;
      color: #0F0F0F;
      padding: 10px 22px;
      border-radius: 100px;
      font-weight: bold;
      z-index: 300;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    .close-drawer {
      text-align: right;
      font-size: 1.6rem;
      cursor: pointer;
      color: #F9B23F;
      margin-bottom: 8px;
    }

    body.rtl .close-drawer {
      text-align: left;
    }
  </style>
</head>
<body class="ltr">
<div class="app-container">
  <div class="app-header">
    <div class="logo">🔥 BONO</div>
    <div class="header-actions">
      <button class="icon-btn" id="langToggleBtn">🇸🇦 AR</button>
      <button class="icon-btn" id="cartDrawerBtn">🛒 <span id="cartCountBadge">0</span></button>
    </div>
  </div>

  <div class="hero-modern">
    <h2 id="heroTitle">Welcome to Buffalo Bono</h2>
    <p id="heroDesc">Flame-grilled beef · crispy chicken · buffalo sauces</p>
    <button class="btn-primary" id="viewMenuBtn">🔥 VIEW MENU 🔥</button>
  </div>

  <div id="categoryTabs" class="category-tabs"></div>
  <div id="menuDynamicRoot"></div>

  <div id="checkoutDrawerOverlay" class="checkout-overlay">
    <div class="checkout-drawer">
      <div class="close-drawer" id="closeDrawerBtn">✕</div>
      <h3 id="cartDrawerTitle">🧾 Your Receipt</h3>
      <div class="receipt-card">
        <div id="cartItemsDynamicList">Cart empty</div>
        <div class="totals" style="margin-top: 12px;">
          <p><span id="subtotalLabel">Subtotal</span>: <strong id="subtotalVal">0</strong> EGP</p>
          <p><span id="taxLabel">Tax 10%</span>: <strong id="taxVal">0</strong> EGP</p>
          <p><span id="deliveryLabel">Delivery</span>: <strong id="deliveryVal">0</strong> EGP</p>
          <p style="font-size:1.2rem; border-top:1px dashed #F9B23F; padding-top:8px;"><span id="finalLabel">TOTAL</span>: <strong id="finalTotalVal">0</strong> EGP</p>
        </div>
      </div>
      <div class="form-section">
        <h4 id="customerFormTitle">📋 Customer info</h4>
        <div class="form-group"><label id="nameLabel">Full Name *</label><input type="text" id="custName" placeholder="Ahmed"></div>
        <div class="form-group"><label id="phoneLabel">Phone *</label><input type="tel" id="custPhone" placeholder="010xxxxxxx"></div>
        <div class="form-group"><label id="altPhoneLabel">Alt Phone</label><input type="tel" id="altPhone"></div>
        <div class="form-group"><label id="govLabel">Governorate *</label><select id="governorateSelect"><option value="Qalyubia">Qalyubia</option><option value="Cairo">Cairo</option></select></div>
        <div class="form-group"><label id="cityLabel">City *</label><select id="citySelect"></select></div>
        <div class="form-group"><label id="addressLabel">Address + landmark *</label><textarea rows="2" id="fullAddress"></textarea></div>
        <button class="place-order-btn" id="placeOrderFinalBtn">✅ PLACE ORDER</button>
      </div>
    </div>
  </div>
  <div id="toastMsg" class="toast-msg">✨ Added</div>
</div>

<script>
  // ---------- MENU DATA ----------
  const MENU_CATEGORIES = [
    { id: "beef", nameEn: "🍔 Flame-Grilled Beef Burgers", nameAr: "🍔 برجر لحم بقري مشوي" },
    { id: "chicken", nameEn: "🍗 Crispy Chicken Burgers", nameAr: "🍗 برجر دجاج مقرمش" },
    { id: "fries", nameEn: "🍟 Fries & Potato Sides", nameAr: "🍟 المقليات والبطاطس" },
    { id: "sauces", nameEn: "🥣 Buffalo Sauces", nameAr: "🥣 صوصات بافلو" },
    { id: "combos", nameEn: "🍔🍟 Full Meal Combos", nameAr: "🍔🍟 الوجبات الكاملة" }
  ];

  const MENU_ITEMS = [
    { id: "b1", categoryId: "beef", nameEn: "Buffalo Classic (Coinsleaf)", nameAr: "بافلو كلاسيك (كوينزليف)", descEn: "100% flame-grilled beef, buffalo sauce", descAr: "لحم بقري مشوي 100%، صوص بافلو", price: 35 },
    { id: "b2", categoryId: "beef", nameEn: "Texas Spicy Burger", nameAr: "برجر تكساس الحار", descEn: "Spicy jalapeño, pepper jack cheese", descAr: "هلابينو حار، جبنة ببر جاك", price: 25 },
    { id: "b3", categoryId: "beef", nameEn: "BBQ Bacon Burger", nameAr: "برجر باربيكيو بيكون", descEn: "Crispy bacon, BBQ sauce, cheddar", descAr: "بيكون مقرمش، صوص باربيكيو، شيدر", price: 35 },
    { id: "b4", categoryId: "beef", nameEn: "Buffalo Classic", nameAr: "بافلو كلاسيك", descEn: "Classic buffalo style beef patty", descAr: "برجر لحم بافلو كلاسيكي", price: 25 },
    { id: "c1", categoryId: "chicken", nameEn: "Chicken Mushroom", nameAr: "تشيكن مشروم", descEn: "Marinated chicken, sautéed mushrooms", descAr: "دجاج متبل، مشروم مقلي", price: 25 },
    { id: "c2", categoryId: "chicken", nameEn: "Super Spicy Chicken (Extra Hot)", nameAr: "دجاج حار جدًا", descEn: "Extra hot crispy chicken", descAr: "دجاج مقرمش حار جداً", price: 45 },
    { id: "c3", categoryId: "chicken", nameEn: "Super Spicy Chicken", nameAr: "دجاج حار", descEn: "Hot crispy chicken fillet", descAr: "فيليه دجاج حار", price: 35 },
    { id: "c4", categoryId: "chicken", nameEn: "Original Crispy Chicken", nameAr: "كرسبي تشيكن أصلي", descEn: "Classic crispy chicken", descAr: "دجاج مقرمش أصلي", price: 25 },
    { id: "f1", categoryId: "fries", nameEn: "Regular Fries", nameAr: "بطاطس عادية", descEn: "Golden crispy fries", descAr: "بطاطس ذهبية", price: 20 },
    { id: "f2", categoryId: "fries", nameEn: "Cheese Fries", nameAr: "بطاطس بالجبنة", descEn: "Melted cheese sauce", descAr: "صوص جبنة", price: 20 },
    { id: "f3", categoryId: "fries", nameEn: "Bacon Cheese Fries", nameAr: "بطاطس بالجبنة والبيكون", descEn: "Cheese + bacon", descAr: "جبنة وبيكون", price: 20 },
    { id: "f4", categoryId: "fries", nameEn: "Original Chicken (add-on)", nameAr: "دجاج أوريجنال", descEn: "Chicken strips", descAr: "ستربس دجاج", price: 40 },
    { id: "f5", categoryId: "fries", nameEn: "BBQ Chicken (add-on)", nameAr: "دجاج باربكيو", descEn: "BBQ glazed chicken", descAr: "دجاج بالباربكيو", price: 40 },
    { id: "f6", categoryId: "fries", nameEn: "Spicy Chicken (add-on)", nameAr: "دجاج سبايسي", descEn: "Spicy breaded chicken", descAr: "دجاج مقرمش حار", price: 30 },
    { id: "f7", categoryId: "fries", nameEn: "Chicken Strips", nameAr: "دجاج ستربس", descEn: "Crispy strips", descAr: "ستربس مقرمش", price: 30 },
    { id: "f8", categoryId: "fries", nameEn: "Chicken Wings", nameAr: "دجاج وينجز", descEn: "Buffalo wings", descAr: "أجنحة بافلو", price: 20 },
    { id: "f9", categoryId: "fries", nameEn: "Chicken Nuggets", nameAr: "دجاج ناجتس", descEn: "Popcorn nuggets", descAr: "ناجتس", price: 20 },
    { id: "sau1", categoryId: "sauces", nameEn: "Spicy Buffalo Sauce", nameAr: "صوص بافلو الحار", descEn: "Fiery buffalo", descAr: "بافلو حار", price: 25 },
    { id: "sau2", categoryId: "sauces", nameEn: "Garlic Sauce (Toum)", nameAr: "صوص الثومية", descEn: "Creamy garlic", descAr: "ثومية كريمية", price: 20 },
    { id: "sau3", categoryId: "sauces", nameEn: "Rich Cheese Sauce", nameAr: "صوص الجبنة الغني", descEn: "Cheddar dip", descAr: "غمس جبنة", price: 25 },
    { id: "sau4", categoryId: "sauces", nameEn: "BBQ Sauce", nameAr: "صوص الباربكيو", descEn: "Smoky BBQ", descAr: "باربكيو مدخن", price: 25 },
    { id: "sau5", categoryId: "sauces", nameEn: "Ranch Sauce", nameAr: "صوص الرانش", descEn: "Herb ranch", descAr: "رانش بالأعشاب", price: 25 },
    { id: "combo1", categoryId: "combos", nameEn: "Classic Combo (35 EGP)", nameAr: "وجبة الكلاسيك كومبو 35", descEn: "Sandwich + medium fries + drink", descAr: "ساندوتش + بطاطس وسط + مشروب", price: 35 },
    { id: "combo2", categoryId: "combos", nameEn: "Classic Combo (25 EGP)", nameAr: "وجبة الكلاسيك كومبو 25", descEn: "Sandwich + fries + drink", descAr: "ساندوتش + بطاطس + مشروب", price: 25 },
    { id: "combo3", categoryId: "combos", nameEn: "Classic Combo (20 EGP)", nameAr: "وجبة الكلاسيك كومبو 20", descEn: "Small meal", descAr: "وجبة صغيرة", price: 20 },
    { id: "combo4", categoryId: "combos", nameEn: "Deluxe Combo", nameAr: "وجبة البليسك كومبو", descEn: "Premium + cheese fries", descAr: "بريميوم + بطاطس بالجبنة", price: 25 },
    { id: "combo5", categoryId: "combos", nameEn: "Mega Classic Combo", nameAr: "وجبة الكلاسيك كومبو 45", descEn: "Double patty + large fries", descAr: "دبل برجر + بطاطس كبير", price: 45 }
  ];

  let cart = [];
  let currentLang = "en";
  let activeCategoryId = "beef";

  function getDeliveryFee() {
    const gov = document.getElementById("governorateSelect")?.value;
    return gov === "Qalyubia" ? 20 : 25;
  }

  function computeSubtotal() {
    return cart.reduce((sum, ci) => {
      const prod = MENU_ITEMS.find(p => p.id === ci.id);
      return sum + (prod ? prod.price * ci.quantity : 0);
    }, 0);
  }

  function updateAllCartUI() {
    const subtotal = computeSubtotal();
    const tax = subtotal * 0.1;
    const delivery = getDeliveryFee();
    const finalTotal = subtotal + tax + delivery;
    const totalItems = cart.reduce((acc, i) => acc + i.quantity, 0);
    
    document.getElementById("cartCountBadge").innerText = totalItems;
    document.getElementById("subtotalVal").innerText = subtotal.toFixed(2);
    document.getElementById("taxVal").innerText = tax.toFixed(2);
    document.getElementById("deliveryVal").innerText = delivery.toFixed(2);
    document.getElementById("finalTotalVal").innerText = finalTotal.toFixed(2);
    
    const cartContainer = document.getElementById("cartItemsDynamicList");
    if (!cartContainer) return;
    
    if (cart.length === 0) {
      cartContainer.innerHTML = `<div style="text-align:center; padding:20px;">🛒 ${currentLang === "en" ? "Cart is empty" : "السلة فارغة"}</div>`;
      return;
    }
    
    let html = "";
    cart.forEach(cartItem => {
      const prod = MENU_ITEMS.find(p => p.id === cartItem.id);
      if (!prod) return;
      const name = currentLang === "en" ? prod.nameEn : prod.nameAr;
      html += `
        <div class="cart-item-row" data-id="${prod.id}">
          <div><strong>${name}</strong><br><span style="font-size:12px;">${prod.price} EGP</span></div>
          <div class="item-actions">
            <input type="number" min="1" value="${cartItem.quantity}" class="qty-input" data-id="${prod.id}" style="width:65px;">
            <button class="del-item-btn" data-id="${prod.id}">🗑️</button>
          </div>
        </div>
      `;
    });
    cartContainer.innerHTML = html;
    
    document.querySelectorAll(".qty-input").forEach(input => {
      input.removeEventListener("input", handleQuantityInput);
      input.addEventListener("input", handleQuantityInput);
    });
    document.querySelectorAll(".del-item-btn").forEach(btn => {
      btn.removeEventListener("click", handleDeleteClick);
      btn.addEventListener("click", handleDeleteClick);
    });
  }
  
  function handleQuantityInput(e) {
    const input = e.target;
    const productId = input.getAttribute("data-id");
    let newQty = parseInt(input.value);
    if (isNaN(newQty) || newQty < 1) newQty = 1;
    const cartItem = cart.find(item => item.id === productId);
    if (cartItem) {
      cartItem.quantity = newQty;
      updateAllCartUI();
    }
  }
  
  function handleDeleteClick(e) {
    const btn = e.currentTarget;
    const productId = btn.getAttribute("data-id");
    cart = cart.filter(item => item.id !== productId);
    updateAllCartUI();
    showToast(currentLang === "en" ? "Removed" : "تم الحذف");
  }
  
  function addToCart(productId) {
    const existing = cart.find(item => item.id === productId);
    if (existing) {
      existing.quantity++;
    } else {
      cart.push({ id: productId, quantity: 1 });
    }
    updateAllCartUI();
    showToast(currentLang === "en" ? "✓ Added to cart" : "✓ تمت الإضافة");
    const btn = document.querySelector(`.add-to-cart-btn[data-id="${productId}"]`);
    if (btn) {
      btn.style.transform = "scale(0.92)";
      setTimeout(() => btn.style.transform = "", 150);
    }
  }
  
  function updateCities() {
    const gov = document.getElementById("governorateSelect").value;
    const citySelect = document.getElementById("citySelect");
    let options = gov === "Qalyubia" ? ["Al Qanater", "Basous", "Ezbet Al Ahali"] : ["Nasr City", "El Rehab", "New Cairo"];
    citySelect.innerHTML = "";
    options.forEach(opt => {
      const option = document.createElement("option");
      option.value = opt;
      option.textContent = opt;
      citySelect.appendChild(option);
    });
    updateAllCartUI();
  }
  
  function renderCategoriesAndMenu() {
    const tabsContainer = document.getElementById("categoryTabs");
    tabsContainer.innerHTML = "";
    MENU_CATEGORIES.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = `category-tab ${activeCategoryId === cat.id ? 'active' : ''}`;
      btn.innerText = currentLang === "en" ? cat.nameEn : cat.nameAr;
      btn.addEventListener("click", () => {
        activeCategoryId = cat.id;
        renderCategoriesAndMenu();
      });
      tabsContainer.appendChild(btn);
    });
    
    const root = document.getElementById("menuDynamicRoot");
    root.innerHTML = "";
    const containerDiv = document.createElement("div");
    containerDiv.className = "menu-items-container active-category";
    const items = MENU_ITEMS.filter(item => item.categoryId === activeCategoryId);
    if (items.length === 0) {
      containerDiv.innerHTML = `<div style="text-align:center; padding:2rem;">${currentLang === "en" ? "No items" : "لا توجد أصناف"}</div>`;
    } else {
      items.forEach(item => {
        const name = currentLang === "en" ? item.nameEn : item.nameAr;
        const desc = currentLang === "en" ? item.descEn : item.descAr;
        const card = document.createElement("div");
        card.className = "menu-card";
        card.innerHTML = `
          <div class="item-info">
            <div class="item-name">${name}</div>
            <div class="item-desc">${desc}</div>
            <div class="item-price">${item.price} EGP</div>
          </div>
          <button class="add-to-cart-btn" data-id="${item.id}">+ ${currentLang === "en" ? "Add" : "أضف"}</button>
        `;
        containerDiv.appendChild(card);
      });
    }
    root.appendChild(containerDiv);
    
    document.querySelectorAll(".add-to-cart-btn").forEach(btn => {
      btn.removeEventListener("click", handleAddClick);
      btn.addEventListener("click", handleAddClick);
    });
  }
  
  function handleAddClick(e) {
    const id = e.currentTarget.getAttribute("data-id");
    addToCart(id);
  }
  
  function setLanguage(lang) {
    currentLang = lang;
    const isAr = lang === "ar";
    document.body.classList.toggle("rtl", isAr);
    document.body.classList.toggle("ltr", !isAr);
    document.getElementById("heroTitle").innerText = isAr ? "مرحباً في بافلو بونو" : "Welcome to Buffalo Bono";
    document.getElementById("heroDesc").innerText = isAr ? "لحم مشوي على اللهب · دجاج مقرمش · صوصات بافلو" : "Flame-grilled beef · crispy chicken · buffalo sauces";
    document.getElementById("viewMenuBtn").innerHTML = isAr ? "🔥 عرض القائمة 🔥" : "🔥 VIEW MENU 🔥";
    document.getElementById("cartDrawerTitle").innerText = isAr ? "🧾 فاتورتك" : "🧾 Your Receipt";
    document.getElementById("customerFormTitle").innerText = isAr ? "📋 بيانات العميل" : "📋 Customer info";
    document.getElementById("nameLabel").innerText = isAr ? "الاسم بالكامل *" : "Full Name *";
    document.getElementById("phoneLabel").innerText = isAr ? "رقم الهاتف *" : "Phone *";
    document.getElementById("altPhoneLabel").innerText = isAr ? "هاتف بديل" : "Alt Phone";
    document.getElementById("govLabel").innerText = isAr ? "المحافظة *" : "Governorate *";
    document.getElementById("cityLabel").innerText = isAr ? "المدينة *" : "City *";
    document.getElementById("addressLabel").innerHTML = isAr ? "العنوان + معلم بارز *" : "Address + landmark *";
    document.getElementById("placeOrderFinalBtn").innerHTML = isAr ? "✅ تأكيد الطلب" : "✅ PLACE ORDER";
    document.getElementById("langToggleBtn").innerHTML = isAr ? "🇬🇧 EN" : "🇸🇦 AR";
    renderCategoriesAndMenu();
    updateAllCartUI();
  }
  
  function showToast(msg) {
    const toast = document.getElementById("toastMsg");
    toast.innerText = msg;
    toast.style.opacity = "1";
    setTimeout(() => toast.style.opacity = "0", 1500);
  }
  
  // ========== دالة الطلب (محلية فقط، بدون إرسال خارجي) ==========
  function placeOrderFinal() {
    const name = document.getElementById("custName").value.trim();
    const phone = document.getElementById("custPhone").value.trim();
    const gov = document.getElementById("governorateSelect").value;
    const city = document.getElementById("citySelect").value;
    const address = document.getElementById("fullAddress").value.trim();
    
    if (!name || !phone || !gov || !city || !address) {
      alert(currentLang === "en" ? "❌ Please fill all required fields" : "❌ الرجاء ملء جميع الحقول المطلوبة");
      return;
    }
    if (cart.length === 0) {
      alert(currentLang === "en" ? "🛒 Cart is empty!" : "🛒 السلة فارغة!");
      return;
    }
    
    let itemsList = "";
    cart.forEach(cItem => {
      const prod = MENU_ITEMS.find(p => p.id === cItem.id);
      if (prod) {
        const nameItem = currentLang === "en" ? prod.nameEn : prod.nameAr;
        itemsList += `${nameItem} x${cItem.quantity} = ${prod.price * cItem.quantity} EGP\n`;
      }
    });
    const subt = computeSubtotal();
    const taxAmt = subt * 0.1;
    const deliv = getDeliveryFee();
    const totalFinal = subt + taxAmt + deliv;
    
    const receiptMsg = `🍔 BURGER BONO ORDER 🧾
${currentLang === "en" ? "Customer" : "العميل"}: ${name}
📞 ${phone}
📍 ${address}, ${city} - ${gov}
--------------------------------
${itemsList}
Subtotal: ${subt} EGP
Tax 10%: ${taxAmt} EGP
Delivery: ${deliv} EGP
TOTAL: ${totalFinal} EGP
${currentLang === "en" ? "Thank you!" : "شكراً لكم!"}`;
    
    alert(receiptMsg);
    
    // تفريغ السلة والحقول بعد الطلب
    cart = [];
    updateAllCartUI();
    document.getElementById("custName").value = "";
    document.getElementById("custPhone").value = "";
    document.getElementById("altPhone").value = "";
    document.getElementById("fullAddress").value = "";
    closeDrawer();
    showToast(currentLang === "en" ? "Order placed! 🎉" : "تم الطلب بنجاح!");
  }
  
  function openDrawer() { document.getElementById("checkoutDrawerOverlay").classList.add("open"); }
  function closeDrawer() { document.getElementById("checkoutDrawerOverlay").classList.remove("open"); }
  
  // Event listeners
  document.getElementById("viewMenuBtn").addEventListener("click", () => {
    document.getElementById("categoryTabs").scrollIntoView({ behavior: "smooth" });
  });
  document.getElementById("cartDrawerBtn").addEventListener("click", openDrawer);
  document.getElementById("closeDrawerBtn").addEventListener("click", closeDrawer);
  document.getElementById("langToggleBtn").addEventListener("click", () => setLanguage(currentLang === "en" ? "ar" : "en"));
  document.getElementById("governorateSelect").addEventListener("change", () => { updateCities(); updateAllCartUI(); });
  document.getElementById("citySelect").addEventListener("change", () => updateAllCartUI());
  document.getElementById("placeOrderFinalBtn").addEventListener("click", placeOrderFinal);
  window.addEventListener("click", (e) => { if (e.target === document.getElementById("checkoutDrawerOverlay")) closeDrawer(); });
  
  // Initialization
  updateCities();
  setLanguage("en");
  updateAllCartUI();
</script>
</body>
  </html>
